<section class="auth-page">
  <h1>Crear cuenta</h1>
  <p class="auth-subtitle">Únete a CBA Arena y lleva tus torneos al siguiente nivel.</p>
  <form (ngSubmit)="registrar()">
    <label>
      Nombre
      <input type="text" [(ngModel)]="nombre" name="nombre" required />
    </label>
    <label>
      Correo
      <input type="email" [(ngModel)]="correo" name="correo" required />
    </label>
    <label>
      Contraseña
      <input type="password" [(ngModel)]="password" name="password" required />
    </label>
    <button type="submit">Registrarse</button>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>

  <div class="auth-actions">
    <a routerLink="/login">¿Ya tienes cuenta? Inicia sesión</a>
  </div>
</section>
