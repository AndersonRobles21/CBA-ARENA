<div class="app-shell">
  <header class="app-header">
    <div class="brand">
      <span class="logo">CBA</span>
      <div>
        <h1>CBA Arena</h1>
        <p class="subtitle">Gestión de torneos de videojuegos en un panel gamer.</p>
      </div>
    </div>

    <nav class="app-nav">
      <a routerLink="/dashboard" *ngIf="isLoggedIn">Dashboard</a>
      <a routerLink="/torneos" *ngIf="isLoggedIn">Torneos</a>
      <a routerLink="/equipos" *ngIf="isLoggedIn">Equipos</a>
      <a routerLink="/partidas" *ngIf="isLoggedIn">Partidas</a>
      <a routerLink="/perfil" *ngIf="isLoggedIn">Perfil</a>
      <a *ngIf="!isLoggedIn" routerLink="/register">Registro</a>
      <a *ngIf="!isLoggedIn" routerLink="/login">Iniciar sesión</a>
      <button *ngIf="isLoggedIn" type="button" (click)="logout()">Cerrar sesión</button>
    </nav>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
